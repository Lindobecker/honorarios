<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LB Contabilidade</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #0a2540, #1e3c72);
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
}

.header {
    text-align: center;
}

.header img {
    width: 120px;
    border-radius: 50%;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.header h1 {
    color: #fff;
    margin-top: 10px;
    font-size: 18px;
}

.card {
    background: #ffffff;
    padding: 25px;
    border-radius: 15px;
    margin-top: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    background: linear-gradient(90deg, #c9a74e, #f4d03f);
    color: #0a2540;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
}

.result {
    margin-top: 15px;
    padding: 15px;
    background: #f4f6fb;
    border-radius: 10px;
    text-align: center;
}

.valor {
    font-size: 22px;
    font-weight: bold;
    color: #1e3c72;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.jpg">
<h1>LB Contabilidade</h1>
</div>

<div class="card">

<input type="text" id="cliente" placeholder="Nome do cliente">

<select id="regime">
<option>Simples Nacional</option>
<option>Presumido</option>
<option>Real</option>
</select>

<select id="atividade">
<option>Servico</option>
<option>Comercio</option>
<option>Industria</option>
</select>

<input type="number" id="faturamento" placeholder="Faturamento anual">
<input type="number" id="func" placeholder="Funcionários">
<input type="number" id="notas" placeholder="Notas/mês">

<button onclick="calcular()">Calcular</button>
<button onclick="gerarPDF()">Gerar Proposta PDF</button>

<div id="resultado" class="result"></div>

</div>
</div>

<script>

const tabela = [/* (mantém igual) */];

let dados = {};

function calcular(){
let regime = document.getElementById("regime").value;
let atividade = document.getElementById("atividade").selectedIndex;
let fat = parseFloat(document.getElementById("faturamento").value);
let func = parseInt(document.getElementById("func").value)||0;
let notas = parseInt(document.getElementById("notas").value)||0;

let base = 0;

tabela.forEach(l=>{
if(l.regime===regime && fat>=l.min && fat<=l.max){
base = l.valores[atividade];
}
});

let total = base + (func*50) + (notas*1);

document.getElementById("resultado").innerHTML =
`<div>Honorário Base</div>
<div class="valor">R$ ${base}</div>
<br>
<div>Total</div>
<div class="valor">R$ ${total}</div>`;

dados = {regime, fat, func, base, total};
}

async function gerarPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let cliente = document.getElementById("cliente").value || "Cliente";

const img = new Image();
img.src = "logo.jpg";

img.onload = function(){

doc.addImage(img, "JPEG", 80, 10, 50, 50);

doc.setFontSize(16);
doc.text("PROPOSTA DE HONORÁRIOS", 20, 80);

doc.setFontSize(12);
doc.text("Cliente: " + cliente, 20, 100);

doc.text("Regime: " + dados.regime, 20, 110);
doc.text("Faturamento: R$ " + dados.fat, 20, 120);
doc.text("Funcionários: " + dados.func, 20, 130);

doc.text("Honorário Base: R$ " + dados.base, 20, 150);
doc.text("Honorário Final: R$ " + dados.total, 20, 160);

doc.text("LB Contabilidade", 20, 190);

doc.save("Proposta_"+cliente+".pdf");

};

}

</script>

</body>
</html>

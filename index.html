<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honorários Contábeis</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1f3c88, #39a0ed);
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    color: white;
    margin-bottom: 20px;
}

label {
    font-weight: 600;
    font-size: 14px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 14px;
    background: #1f3c88;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #163172;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    background: #f1f5ff;
    text-align: center;
    font-size: 18px;
}

.valor {
    font-size: 22px;
    font-weight: bold;
    color: #1f3c88;
}
</style>
</head>

<body>

<div class="container">
    <h1>Honorários</h1>

    <div class="card">

        <label>Regime</label>
        <select id="regime">
            <option>Simples Nacional</option>
            <option>Presumido</option>
            <option>Real</option>
        </select>

        <label>Atividade</label>
        <select id="atividade">
            <option>Servico</option>
            <option>Comercio</option>
            <option>Industria</option>
        </select>

        <label>Faturamento Anual</label>
        <input type="number" id="faturamento" placeholder="Ex: 50000">

        <label>Funcionários</label>
        <input type="number" id="func" placeholder="Ex: 2">

        <label>Notas/mês</label>
        <input type="number" id="notas" placeholder="Ex: 20">

        <button onclick="calcular()">Calcular Honorários</button>

        <div class="result" id="resultado" style="display:none;"></div>

    </div>
</div>

<script>
const tabela = [
{regime:"Simples Nacional",min:0,max:180000,valores:[800,1100,1250]},
{regime:"Simples Nacional",min:180000.01,max:360000,valores:[1200,1850,2100]},
{regime:"Simples Nacional",min:360000.01,max:720000,valores:[2250,2450,2650]},
{regime:"Simples Nacional",min:720000.01,max:1800000,valores:[3250,3505,3625]},
{regime:"Simples Nacional",min:1800000.01,max:3600000,valores:[4680,4985,5245]},
{regime:"Simples Nacional",min:3600000.01,max:4800000,valores:[5850,6450,6875]},

{regime:"Presumido",min:0,max:180000,valores:[950,1220,1320]},
{regime:"Presumido",min:180000.01,max:360000,valores:[2120,2320,2485]},
{regime:"Presumido",min:360000.01,max:720000,valores:[4395,4645,4765]},
{regime:"Presumido",min:720000.01,max:1800000,valores:[5205,5450,5500]},
{regime:"Presumido",min:1800000.01,max:3600000,valores:[6285,6530,6685]},
{regime:"Presumido",min:3600000.01,max:4800000,valores:[8450,8710,8830]},

{regime:"Real",min:0,max:180000,valores:[1650,1880,2000]},
{regime:"Real",min:180000.01,max:360000,valores:[3200,3420,3625]},
{regime:"Real",min:360000.01,max:720000,valores:[3950,4210,4420]},
{regime:"Real",min:720000.01,max:1800000,valores:[6200,6450,6850]},
{regime:"Real",min:1800000.01,max:3600000,valores:[9100,10120,10295]},
{regime:"Real",min:3600000.01,max:4800000,valores:[13120,13350,13450]}
];

function calcular(){
let regime = document.getElementById("regime").value;
let atividade = document.getElementById("atividade").selectedIndex;
let fat = parseFloat(document.getElementById("faturamento").value);
let func = parseInt(document.getElementById("func").value)||0;
let notas = parseInt(document.getElementById("notas").value)||0;

let base = 0;

tabela.forEach(l => {
if(l.regime === regime && fat >= l.min && fat <= l.max){
base = l.valores[atividade];
}
});

if(base === 0){
alert("Não encontrado");
return;
}

let total = base + (func*50) + (notas*1);

let resultado = document.getElementById("resultado");
resultado.style.display = "block";

resultado.innerHTML =
`<div>Honorário Base</div>
<div class="valor">R$ ${base.toLocaleString('pt-BR')}</div>
<br>
<div>Total</div>
<div class="valor">R$ ${total.toLocaleString('pt-BR')}</div>`;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Honorários Contábeis</title>

<!-- Biblioteca PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #1f3c88, #39a0ed);
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
}

h1 {
    text-align: center;
    color: white;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    background: #1f3c88;
    color: white;
    font-weight: bold;
    border-radius: 8px;
}

.result {
    margin-top: 15px;
    padding: 15px;
    background: #f1f5ff;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
<h1>Honorários</h1>

<div class="card">

<input type="text" id="cliente" placeholder="Nome do cliente">

<select id="regime">
<option>Simples Nacional</option>
<option>Presumido</option>
<option>Real</option>
</select>

<select id="atividade">
<option>Servico</option>
<option>Comercio</option>
<option>Industria</option>
</select>

<input type="number" id="faturamento" placeholder="Faturamento anual">
<input type="number" id="func" placeholder="Funcionários">
<input type="number" id="notas" placeholder="Notas/mês">

<button onclick="calcular()">Calcular</button>
<button onclick="gerarPDF()">Gerar Proposta PDF</button>

<div id="resultado" class="result"></div>

</div>
</div>

<script>

const tabela = [
{regime:"Simples Nacional",min:0,max:180000,valores:[800,1100,1250]},
{regime:"Simples Nacional",min:180000,max:360000,valores:[1200,1850,2100]},
{regime:"Simples Nacional",min:360000,max:720000,valores:[2250,2450,2650]},
{regime:"Simples Nacional",min:720000,max:1800000,valores:[3250,3505,3625]},
{regime:"Simples Nacional",min:1800000,max:3600000,valores:[4680,4985,5245]},
{regime:"Simples Nacional",min:3600000,max:4800000,valores:[5850,6450,6875]},

{regime:"Presumido",min:0,max:180000,valores:[950,1220,1320]},
{regime:"Presumido",min:180000,max:360000,valores:[2120,2320,2485]},
{regime:"Presumido",min:360000,max:720000,valores:[4395,4645,4765]},
{regime:"Presumido",min:720000,max:1800000,valores:[5205,5450,5500]},
{regime:"Presumido",min:1800000,max:3600000,valores:[6285,6530,6685]},
{regime:"Presumido",min:3600000,max:4800000,valores:[8450,8710,8830]},

{regime:"Real",min:0,max:180000,valores:[1650,1880,2000]},
{regime:"Real",min:180000,max:360000,valores:[3200,3420,3625]},
{regime:"Real",min:360000,max:720000,valores:[3950,4210,4420]},
{regime:"Real",min:720000,max:1800000,valores:[6200,6450,6850]},
{regime:"Real",min:1800000,max:3600000,valores:[9100,10120,10295]},
{regime:"Real",min:3600000,max:4800000,valores:[13120,13350,13450]}
];

let ultimoResultado = {};

function calcular(){
let regime = document.getElementById("regime").value;
let atividade = document.getElementById("atividade").selectedIndex;
let fat = parseFloat(document.getElementById("faturamento").value);
let func = parseInt(document.getElementById("func").value)||0;
let notas = parseInt(document.getElementById("notas").value)||0;

let base = 0;

tabela.forEach(l=>{
if(l.regime===regime && fat>=l.min && fat<=l.max){
base = l.valores[atividade];
}
});

let total = base + (func*50) + (notas*1);

document.getElementById("resultado").innerHTML =
`Base: R$ ${base}<br>Total: R$ ${total}`;

ultimoResultado = {regime, fat, func, notas, base, total};
}

function gerarPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let cliente = document.getElementById("cliente").value || "Cliente";

doc.setFontSize(16);
doc.text("PROPOSTA DE HONORÁRIOS", 20, 20);

doc.setFontSize(12);
doc.text("Cliente: " + cliente, 20, 40);

doc.text("Regime: " + ultimoResultado.regime, 20, 50);
doc.text("Faturamento: R$ " + ultimoResultado.fat, 20, 60);
doc.text("Funcionários: " + ultimoResultado.func, 20, 70);

doc.text("Honorário Base: R$ " + ultimoResultado.base, 20, 90);
doc.text("Honorário Final: R$ " + ultimoResultado.total, 20, 100);

doc.text("Proposta válida por 10 dias.", 20, 130);

doc.save("proposta.pdf");
}

</script>

</body>
</html>

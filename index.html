<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calculadora de Honorários Contábeis</title>

<style>
body {
    font-family: Arial;
    background: #eef2f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 420px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}
h2 {
    text-align: center;
}
label {
    font-weight: bold;
}
input, select {
    width: 100%;
    padding: 8px;
    margin: 6px 0 14px;
}
button {
    width: 100%;
    padding: 10px;
    background: #1f6feb;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
}
.result {
    margin-top: 15px;
    text-align: center;
    font-size: 18px;
}
</style>

</head>

<body>

<div class="container">
    <h2>Calculadora de Honorários</h2>

    <label>Regime</label>
    <select id="regime">
        <option>Simples Nacional</option>
        <option>Presumido</option>
        <option>Real</option>
    </select>

    <label>Atividade</label>
    <select id="atividade">
        <option>Servico</option>
        <option>Comercio</option>
        <option>Industria</option>
    </select>

    <label>Faturamento Anual</label>
    <input type="number" id="faturamento">

    <label>Funcionários</label>
    <input type="number" id="func">

    <label>Notas/mês</label>
    <input type="number" id="notas">

    <button onclick="calcular()">Calcular</button>

    <div class="result" id="resultado"></div>
</div>

<script>

const tabela = [

    // SIMPLES
    {regime:"Simples Nacional", min:0, max:90000, valores:[400,550,625]},
    {regime:"Simples Nacional", min:90001, max:180000, valores:[800,1100,1250]},
    {regime:"Simples Nacional", min:180000.01, max:360000, valores:[1200,1850,2100]},
    {regime:"Simples Nacional", min:360000.01, max:720000, valores:[2250,2450,2650]},
    {regime:"Simples Nacional", min:720000.01, max:1800000, valores:[3250,3505,3625]},
    {regime:"Simples Nacional", min:1800000.01, max:3600000, valores:[4680,4985,5245]},
    {regime:"Simples Nacional", min:3600000.01, max:4800000, valores:[5850,6450,6875]},

    // PRESUMIDO
    {regime:"Presumido", min:0, max:180000, valores:[950,1220,1320]},
    {regime:"Presumido", min:180000.01, max:360000, valores:[2120,2320,2485]},
    {regime:"Presumido", min:360000.01, max:720000, valores:[4395,4645,4765]},
    {regime:"Presumido", min:720000.01, max:1800000, valores:[5205,5450,5500]},
    {regime:"Presumido", min:1800000.01, max:3600000, valores:[6285,6530,6685]},
    {regime:"Presumido", min:3600000.01, max:4800000, valores:[8450,8710,8830]},

    // REAL
    {regime:"Real", min:0, max:180000, valores:[1650,1880,2000]},
    {regime:"Real", min:180000.01, max:360000, valores:[3200,3420,3625]},
    {regime:"Real", min:360000.01, max:720000, valores:[3950,4210,4420]},
    {regime:"Real", min:720000.01, max:1800000, valores:[6200,6450,6850]},
    {regime:"Real", min:1800000.01, max:3600000, valores:[9100,10120,10295]},
    {regime:"Real", min:3600000.01, max:4800000, valores:[13120,13350,13450]}

];

function calcular() {

    let regime = document.getElementById("regime").value;
    let atividade = document.getElementById("atividade").selectedIndex;
    let fat = parseFloat(document.getElementById("faturamento").value);
    let func = parseInt(document.getElementById("func").value) || 0;
    let notas = parseInt(document.getElementById("notas").value) || 0;

    let base = 0;

    tabela.forEach(linha => {
        if (linha.regime === regime && fat >= linha.min && fat <= linha.max) {
            base = linha.valores[atividade];
        }
    });

    if (base === 0) {
        document.getElementById("resultado").innerHTML = "❌ Não encontrado.";
        return;
    }

    let total = base + (func * 50) + (notas * 1);

    document.getElementById("resultado").innerHTML =
        `<strong>Honorário Base:</strong> R$ ${base.toLocaleString('pt-BR')}<br>
         <strong>Honorário Final:</strong> R$ ${total.toLocaleString('pt-BR')}`;
}

</script>

</body>
</html>
